name: citra-format

on:
  workflow_dispatch:

jobs:
  ktlint:
    runs-on: ubuntu-latest
    container:
      image: opensauce04/azahar-build-environment:latest
      options: -u 1001
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        run: ./tools/check-kotlin-formatting.sh
